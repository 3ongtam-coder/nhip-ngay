name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vinext build

      - name: Prepare D1 database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_NAME: site-creator-d1
        run: |
          set -euo pipefail

          find_database_id() {
            npx wrangler d1 list --json | node -e '
              let input = "";
              process.stdin.on("data", chunk => input += chunk);
              process.stdin.on("end", () => {
                const databases = JSON.parse(input);
                const database = databases.find(item => item.name === process.argv[1]);
                process.stdout.write(database?.uuid ?? database?.id ?? "");
              });
            ' "$D1_DATABASE_NAME"
          }

          database_id="$(find_database_id)"
          if [ -z "$database_id" ]; then
            npx wrangler d1 create "$D1_DATABASE_NAME" --location apac
            database_id="$(find_database_id)"
          fi

          if [ -z "$database_id" ]; then
            echo "Unable to find or create D1 database: $D1_DATABASE_NAME" >&2
            exit 1
          fi

          node - "$database_id" <<'NODE'
          const fs = require("node:fs");
          const configPath = "dist/server/wrangler.json";
          const databaseId = process.argv[2];
          const config = JSON.parse(fs.readFileSync(configPath, "utf8"));
          const bindings = (config.d1_databases ?? []).filter(item => item.binding === "DB");
          if (bindings.length !== 1) {
            throw new Error(`Expected exactly one DB binding, found ${bindings.length}`);
          }
          bindings[0].database_id = databaseId;
          bindings[0].database_name = "site-creator-d1";
          bindings[0].migrations_dir = "../../drizzle";
          fs.writeFileSync(configPath, JSON.stringify(config));
          NODE

          npx wrangler d1 migrations apply "$D1_DATABASE_NAME" \
            --remote \
            --config dist/server/wrangler.json

      - name: Configure application password
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ ${#APP_PASSWORD} -lt 12 ]; then
            echo "::error::Repository secret APP_PASSWORD is missing or shorter than 12 characters."
            exit 1
          fi
          printf '%s' "$APP_PASSWORD" | npx wrangler secret put APP_PASSWORD \
            --config dist/server/wrangler.json

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
